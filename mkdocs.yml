site_name: Trading & Stock Market Glossary
site_description: An interactive glossary of trading concepts and stock market terminology.
theme:
  name: material
  icon:
    logo: material/trending-up
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # Palette toggle for light/dark mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: slate
      accent: emerald
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: slate
      accent: emerald
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true

nav:
  - Home: index.md
  - Order Types:
    - GTDt (Good Till Date): orders/gtdt.md
    - GTT (Good Till Triggered): orders/gtt.md
    - Standard Orders: orders/common-types.md
  - Market Concepts:
    - Bid-Ask Spread: terms/bid-ask.md
